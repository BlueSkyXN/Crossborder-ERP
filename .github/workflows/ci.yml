name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "ai/**"

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend dependencies
        run: uv sync --locked --dev

      - name: Check Django project
        run: uv run python manage.py check

      - name: Generate OpenAPI schema
        run: uv run python manage.py spectacular --file /tmp/crossborder-openapi.yaml

      - name: Run backend tests
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint admin web
        run: pnpm --filter @crossborder-erp/admin-web lint

      - name: Build admin web
        run: pnpm --filter @crossborder-erp/admin-web build
